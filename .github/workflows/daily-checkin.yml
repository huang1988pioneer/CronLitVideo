name: Daily LitMedia Check-in

on:
  schedule:
    # GitHub Actions uses UTC.
    # 21:05 UTC is 05:05 in Asia/Taipei.
    # 09:05 UTC is 17:05 in Asia/Taipei.
    - cron: "5 21 * * *"
    - cron: "5 9 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: checkin (${{ matrix.account }}) - ${{ matrix.label }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - account: 1
            label: samafengtu-checkin (1)
          - account: 2
            label: fengtusama-checkin (2)
          - account: 3
            label: tushenbyfengbro-checkin (3)
          - account: 4
            label: fengwithting0831-checkin (4)
          - account: 5
            label: fengwithfeng1127-checkin (5)
          - account: 6
            label: fengwithtu1127-checkin (6)
          - account: 7
            label: akaonda333-checkin (7)
          - account: 8
            label: fbussinessengen-checkin (8)
          - account: 9
            label: gdictatorff-checkin (9)
          - account: 10
            label: engtuprinfo-checkin (10)
          - account: 11
            label: flottojackpot-checkin (11)
          - account: 12
            label: engfeng33feng35feng3-checkin (12)
          - account: 13
            label: chbondg2-checkin (13)
          - account: 14
            label: chbondg_outlook-checkin (14)
          - account: 15
            label: gaokaolevel3iptopscorer_outlook-checkin (15)
          - account: 16
            label: huang1988pioneer_outlook-checkin (16)
          - account: 17
            label: fengtuta_tutamail-checkin (17)
          - account: 18
            label: fengfence_mailfence-checkin (18)
          - account: 19
            label: account-19
          - account: 20
            label: account-20
          - account: 21
            label: account-21
          - account: 22
            label: account-22
          - account: 23
            label: account-23
          - account: 24
            label: account-24
          - account: 25
            label: account-25
          - account: 26
            label: account-26
          - account: 27
            label: account-27
          - account: 28
            label: account-28
          - account: 29
            label: account-29
          - account: 30
            label: account-30
          - account: 31
            label: account-31
          - account: 32
            label: account-32
          - account: 33
            label: account-33

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check account secret
        id: account_secret
        env:
          LITMEDIA_STORAGE_STATE_BASE64: ${{ secrets[format('LITMEDIA_STORAGE_STATE_BASE64_{0}', matrix.account)] }}
        run: |
          if [ -n "$LITMEDIA_STORAGE_STATE_BASE64" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping account ${{ matrix.account }}: LITMEDIA_STORAGE_STATE_BASE64_${{ matrix.account }} is not configured."
          fi

      - name: Install Playwright browser
        if: steps.account_secret.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run daily check-in
        if: steps.account_secret.outputs.configured == 'true'
        env:
          LITMEDIA_ACCOUNT_INDEX: ${{ matrix.account }}
          LITMEDIA_ACCOUNT_LABEL: ${{ matrix.label }}
          LITMEDIA_STORAGE_STATE_BASE64: ${{ secrets[format('LITMEDIA_STORAGE_STATE_BASE64_{0}', matrix.account)] }}
          LITMEDIA_URL: ${{ vars.LITMEDIA_URL }}
        run: npm run checkin

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: litmedia-checkin-failure-${{ matrix.account }}
          path: test-results/checkin-failure.png
          if-no-files-found: ignore
